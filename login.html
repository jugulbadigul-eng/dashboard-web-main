<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body {
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
        }
        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
        }
        .login-left {
            flex: 1;
            background: #064e3b;
            border-top-right-radius: 60px;
            border-bottom-right-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 40px;
            flex-direction: column;
            text-align: center;
            box-shadow: 10px 0 30px rgba(0,0,0,0.2);
            z-index: 2;
        }
        .login-left h1 { font-size: 2.5rem; margin-bottom: 20px; font-weight: 700; letter-spacing: -1px; }
        .login-left p { font-size: 1.1rem; opacity: 0.8; max-width: 300px; line-height: 1.5; }
        .login-right {
            flex: 1.2;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
        }
        .login-card h2 { margin-bottom: 30px; font-size: 1.8rem; color: #1e293b; font-weight: 700; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; font-size: 0.9rem; font-weight: 600; color: #475569; }
        .form-input { 
            width: 100%; padding: 12px 16px; border: 1.5px solid #cbd5e1; border-radius: 8px; 
            font-size: 1rem; transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus { outline: none; border-color: #0d9488; box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1); }
        .btn-primary {
            width: 100%; padding: 14px; background: #0f766e; color: white; border: none; border-radius: 8px;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px;
        }
        .btn-primary:hover { background: #0d9488; }
        .error-message { color: #dc2626; font-size: 0.9rem; margin-top: 15px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <h1>Welcome Back</h1>
            <p>Sign in to access the Complaint Tracking Dashboard</p>
        </div>
        <div class="login-right">
            <div class="login-card">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="admin@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary" id="loginBtn">Sign In</button>
                    <div id="errorMsg" class="error-message"></div>
                </form>
            </div>
        </div>
    </div>

    <!-- Login Logic -->
    <script src="auth.js"></script>
</body>
</html>
