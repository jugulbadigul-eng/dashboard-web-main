<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - Complaint Tracking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }
    body {
      min-height: 100vh;
      background-color: #1ad196;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    /* Dark green curved background on the left */
    .bg-curve {
      position: absolute;
      top: -25vh;
      left: -25vw;
      width: 70vw;
      height: 150vh;
      background-color: #06382b;
      border-radius: 50%;
      z-index: 1;
    }
    .auth-container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }
    .auth-card {
      background-color: #0d3d32;
      border-radius: 16px;
      padding: 45px 36px 36px 36px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
      color: #ffffff;
      text-align: center;
    }
    .auth-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 30px;
      letter-spacing: -0.3px;
      color: #ffffff;
    }
    .input-group {
      position: relative;
      margin-bottom: 16px;
    }
    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      stroke: #80b3a6;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px 14px 48px;
      background-color: #174d41;
      border: 1px solid #236354;
      border-radius: 8px;
      color: #ffffff;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s, background-color 0.2s;
    }
    .auth-input::placeholder {
      color: #80b3a6;
    }
    .auth-input:focus {
      border-color: #1ad196;
      background-color: #1b574a;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background-color: #ffffff;
      color: #0d3d32;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.8px;
      cursor: pointer;
      margin-top: 10px;
      transition: background-color 0.2s, transform 0.1s;
    }
    .btn-submit:hover {
      background-color: #e6f7f2;
    }
    .btn-submit:active {
      transform: scale(0.99);
    }
    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: #5d998b;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid #1a5749;
    }
    .divider span {
      padding: 0 12px;
    }
    .auth-footer {
      font-size: 0.88rem;
      color: #a3d4c8;
    }
    .auth-footer a {
      color: #ffffff;
      font-weight: 600;
      text-decoration: none;
      margin-left: 5px;
    }
    .auth-footer a:hover {
      text-decoration: underline;
    }
    .error-msg {
      background-color: rgba(220, 38, 38, 0.2);
      border: 1px solid #ef4444;
      color: #fca5a5;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg {
      background-color: rgba(16, 185, 129, 0.2);
      border: 1px solid #10b981;
      color: #a7f3d0;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="bg-curve"></div>

  <div class="auth-container">
    <div class="auth-card">
      <h1 class="auth-title">Create Account</h1>

      <div id="errorMsg" class="error-msg"></div>
      <div id="successMsg" class="success-msg"></div>

      <form id="signupForm">
        <div class="input-group">
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="username" class="auth-input" placeholder="Username" required />
        </div>

        <div class="input-group">
          <svg class="input-icon" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <input type="email" id="email" class="auth-input" placeholder="Email address" required />
        </div>

        <div class="input-group">
          <svg class="input-icon" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="password" class="auth-input" placeholder="Password" required />
        </div>

        <div class="input-group">
          <svg class="input-icon" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="confirmPassword" class="auth-input" placeholder="Confirm Password" required />
        </div>

        <button type="submit" class="btn-submit" id="signupBtn">SIGN UP</button>
      </form>

      <div class="divider">
        <span>OR</span>
      </div>

      <div class="auth-footer">
        Already have an account? <a href="login.html">SIGN IN</a>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
